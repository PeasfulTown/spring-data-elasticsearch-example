services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.15
    container_name: article_elasticsearch
    restart: unless-stopped
    environment:
      xpack.security.enabled: false
      discovery.type: single-node
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - article_es_data:/usr/share/elasticsearch/data
    networks:
      - elasticsearch_test

  kibana:
    image: docker.elastic.co/kibana/kibana:8.19.15
    container_name: article_kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    networks:
      - elasticsearch_test

networks:
  elasticsearch_test:
    name: elasticsearch_test
    driver: bridge

volumes:
  article_es_data:
